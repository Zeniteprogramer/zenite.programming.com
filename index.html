<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenite Code</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="vscode-container">
        <!-- Barra lateral fina de ícones -->
        <div class="activity-bar">
            <div class="icon active">📄</div>
            <div class="icon">🔍</div>
            <div class="icon">🍴</div>
            <div class="icon">⚙️</div>
        </div>

        <!-- Menu do Explorador -->
        <div class="sidebar">
            <p class="sidebar-title">EXPLORER: ZNT-CORE</p>
            <div class="file active">index.znt</div>
        </div>

        <!-- Editor de Código -->
        <main class="editor">
            <div class="tabs">
                <div class="tab active">index.znt <span>x</span></div>
            </div>
            <div class="code-area">
                <pre><code><span class="keyword">set</span> name = <span class="string">"Geni"</span>
<span class="keyword">print</span> <span class="string">"Zenite Core v1"</span></code></pre>
            </div>
            
            <!-- Botão de Download Redondo -->
            <a href="logo.png" download="Zenite_Z" class="btn-download" title="Download Zenite">
                ↓
            </a>
        </main>
    </div>
</body>
</html>
