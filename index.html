<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Zênite Code</title>
    <link rel="stylesheet" href="style.css">
    <!-- Link para o instalador do App -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFCC00">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <span class="logo-text">Zênite Code</span>
            <div class="nav-links">
                <a href="#">Docs</a>
                <a href="#">Updates</a>
                <a href="#" class="btn-nav-download">Download</a>
            </div>
        </div>
    </nav>

    <main class="download-section">
        <h1>Download Zênite Code</h1>
        <p class="subtitle">Linguagem ZNT nativa. Grátis e focado em performance.</p>

        <div class="download-card">
            <img src="logo.png" alt="Zênite Logo" class="big-logo">
            <div class="platform-info">
                <span class="os-icon">🪟</span>
                <h3>Windows</h3>
                <p>Windows 10, 11</p>
            </div>

            <!-- Botão Mágico: Instala o App ou Baixa o ZIP (Plano B) -->
            <a href="ZeniteCode.zip" download="ZeniteCode.zip" class="main-download-btn" id="install-button">
                <span>↓</span> Install Zênite
            </a>

            <div class="sub-links">
                <span>x64</span>
                <span>Arm64</span>
            </div>
        </div>

        <p class="footer-text">Ao baixar, você concorda com os termos da licença ZNT.</p>
    </main>

    <!-- Script que faz o navegador entender que é um App -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
