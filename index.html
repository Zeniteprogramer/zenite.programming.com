<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index.znt — Zenite Code</title>
    <link rel="stylesheet" href="style.css">
    <!-- Link para o instalador do App -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFCC00">
</head>
<body>
    <div class="window">
        <aside class="activity-bar">
            <div class="top-icons">
                <div class="a-icon active" id="btn-explorer">📄</div>
                <div class="a-icon">🔍</div>
                <div class="a-icon">🌿</div>
            </div>
            <div class="bottom-icons">
                <div class="a-icon" id="btn-settings">⚙️</div>
            </div>
        </aside>

        <aside class="sidebar" id="panel-explorer">
            <div class="sidebar-header">EXPLORER: ZNT-CORE</div>
            <div class="sidebar-section">
                <details open>
                    <summary>ZENITE-PROJECT</summary>
                    <div class="file-item active">index.znt</div>
                    <div class="file-item">style.css</div>
                </details>
            </div>
        </aside>

        <main class="main-editor">
            <header class="tabs-container">
                <div class="tab active">
                    <span class="file-icon">Z</span> index.znt
                </div>
            </header>
            
            <div class="editor-content">
                <div class="line-numbers" id="gutter">1</div>
                <textarea id="code-editor" spellcheck="false">set name = "Geni"&#10;print "Zenite Core v1"</textarea>
            </div>

            <!-- Botão de Instalação/Download -->
            <button id="install-button" class="floating-dl" title="Instalar Zênite Code">↓</button>

            <footer class="status-bar">
                <div class="status-left"><span>main*</span></div>
                <div class="status-right"><span>UTF-8</span> <span>ZNT Language</span></div>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Registra o Service Worker para permitir instalação
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
